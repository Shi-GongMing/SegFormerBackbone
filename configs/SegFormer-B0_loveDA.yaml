experiment_name: segformer_b0_loveda
save_dir: outputs/segformer_b0_loveda
seed: 42
device: cuda # Use "cuda" for GPU, "mps" for Apple Silicon, or "cpu" for CPU
num_classes: 7
ignore_index: 255
class_names: ["background","building","road", "water", "barren", "forest", "agricultural"]

data:
  train_image_dir: /Users/userming/SegFormer-B0/datasets/data/loveDA/Train/Train/images
  train_mask_dir: /Users/userming/SegFormer-B0/datasets/data/loveDA/Train/Train/masks
  val_image_dir: /Users/userming/SegFormer-B0/datasets/data/loveDA/Val/Val/images
  val_mask_dir: /Users/userming/SegFormer-B0/datasets/data/loveDA/Val/Val/masks
  img_suffix: .png
  mask_suffix: .png
  val_size: [512, 512]

model:
  in_chans: 3
  decoder_dim: 256
  drop_path_rate: 0.1
  dropout: 0.1

train:
  epochs: 100
  batch_size: 1
  val_batch_size: 1
  num_workers: 0
  crop_size: [512, 512]
  scale_range: [0.5, 2.0]
  hflip_prob: 0.5
  color_jitter_prob: 0.2
  base_lr: 0.00006
  weight_decay: 0.01
  grad_clip: 1.0
  amp: false #CUDA->true, MPS->false, CPU->false
  log_interval: 10
  save_visuals_every: 1
  use_tensorboard: true
  compile_model: false

resume: ""
checkpoint_for_infer: outputs/segformer_b0_loveda/best_miou.pth
