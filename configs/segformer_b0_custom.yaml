experiment_name: segformer_b0_custom
save_dir: outputs/segformer_b0_custom
seed: 42
device: cuda
num_classes: 2
ignore_index: 255
class_names: ["background", "object"]

data:
  train_image_dir: data/train/images
  train_mask_dir: data/train/masks
  val_image_dir: data/val/images
  val_mask_dir: data/val/masks
  img_suffix: .jpg
  mask_suffix: .png
  val_size: [512, 512]

model:
  in_chans: 3
  decoder_dim: 256
  drop_path_rate: 0.1
  dropout: 0.1

train:
  epochs: 100
  batch_size: 4
  val_batch_size: 2
  num_workers: 4
  crop_size: [512, 512]
  scale_range: [0.5, 2.0]
  hflip_prob: 0.5
  color_jitter_prob: 0.2
  base_lr: 0.00006
  weight_decay: 0.01
  grad_clip: 1.0
  amp: true
  log_interval: 10
  save_visuals_every: 1
  use_tensorboard: true
  compile_model: false

resume: ""
checkpoint_for_infer: outputs/segformer_b0_custom/best_miou.pth
